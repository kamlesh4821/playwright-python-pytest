base_url: "${BASE_URL}"
browser: chromium
headless: true
action_timeout_ms: 15000
navigation_timeout_ms: 45000
screenshot_on_failure: true
video_on_failure: false

browser_args:
  - "--no-sandbox"
  - "--disable-dev-shm-usage"
  - "--disable-gpu"

database:
  host: "${DB_HOST}"
  port: 5432
  name: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
