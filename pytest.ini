[pytest]
testpaths = features
python_files = test_*.py
addopts =
    --alluredir=allure-results
    --timeout=60
    -v
    --tb=short

filterwarnings =
    ignore::DeprecationWarning
    ignore::PytestUnknownMarkWarning

markers =
    smoke: critical path scenarios, must complete under 5 minutes
    regression: full regression suite
    negative: error and edge case scenarios
    e2e: end-to-end full journey scenarios
    auth: authentication and session related
    catalog: product catalog and browsing
    cart: cart management
    checkout: checkout flow
    sorting: sorting and filtering behavior
    session: session handling and logout
    db: database validation scenarios
