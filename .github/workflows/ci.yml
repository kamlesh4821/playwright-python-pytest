name: Saucedemo Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: "Test tags to run (e.g. @smoke, @regression)"
        default: "@smoke"
        required: false
      environment:
        description: "Target environment"
        default: "ci"
        required: false
        type: choice
        options: [ci, staging, qa]

env:
  ENV: ${{ github.event.inputs.environment || 'ci' }}
  HEADLESS: "true"
  BROWSER: chromium
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          pytest -m "${{ github.event.inputs.tags || 'smoke' }}" \
            --alluredir=allure-results \
            --reruns ${{ vars.RETRY_COUNT || 1 }} \
            -v

      - name: Prepare Allure report
        if: always()
        run: |
          cp allure-config/categories.json allure-results/ 2>/dev/null || true
          allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          keep_files: false

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Upload screenshots and traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failure-artifacts-${{ github.run_number }}
          path: |
            reports/screenshots/
            reports/traces/
          retention-days: 14

      - name: Notify Microsoft Teams on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "FF0000",
              "summary": "Test Run Failed",
              "sections": [{
                "activityTitle": "🔴 Saucedemo Automation — Test Run Failed",
                "activitySubtitle": "Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }}",
                "facts": [
                  { "name": "Repository", "value": "${{ github.repository }}" },
                  { "name": "Branch", "value": "${{ github.ref_name }}" },
                  { "name": "Commit", "value": "${{ github.sha }}" },
                  { "name": "CI Run", "value": "[${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" },
                  { "name": "Report", "value": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" }
                ]
              }]
            }'
